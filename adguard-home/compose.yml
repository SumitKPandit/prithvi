services:
  dns-server:
    image: adguard/adguardhome:v0.107.77
    container_name: adguard-home
    restart: unless-stopped
    volumes:
      - ./adguard/work:/opt/adguardhome/work
      - ./adguard/conf:/opt/adguardhome/conf
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "8001:80/tcp"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"