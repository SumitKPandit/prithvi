services:
  dns-server:
    image: adguard/adguardhome:latest
    restart: unless-stopped
    volumes:
      - ./adguard/work:/opt/adguardhome/work
      - ./adguard/conf:/opt/adguardhome/conf
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "853:853/tcp"
      - "443:443/tcp"
      - "3001:3000/tcp"
      - "8001:80/tcp"