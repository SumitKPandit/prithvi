# Run with docker compose up -d
services:
  dozzle:
    image: amir20/dozzle:v10.6.9
    container_name: dozzle
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./data:/data
    networks:
      - traefik-network
    labels:
      - traefik.enable=true
      - traefik.http.routers.dozzle.rule=Host(`dozzle.lan.sumitkpandit.in`)
      - traefik.http.routers.dozzle.entrypoints=websecure
      - traefik.http.routers.dozzle.tls.certresolver=cloudflare
      - traefik.http.services.dozzle.loadbalancer.server.port=8080
      - homepage.group=Infrastructure
      - homepage.icon=dozzle.svg
      - homepage.name=Dozzle
      - homepage.href=https://dozzle.lan.sumitkpandit.in
      - homepage.description=Real-time Docker logs, stats, and debugging — in your browser

networks:
  traefik-network:
    external: true